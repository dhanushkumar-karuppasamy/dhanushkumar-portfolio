<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Laptop/Device mockup for projects -->
  <g id="project-mockup">
    <!-- Laptop base -->
    <rect x="50" y="180" width="300" height="100" rx="10" fill="#E5E5E5" stroke="#000" stroke-width="3"/>
    
    <!-- Laptop screen -->
    <rect x="80" y="40" width="240" height="150" rx="8" fill="#000" stroke="#000" stroke-width="3"/>
    
    <!-- Screen content -->
    <rect x="90" y="50" width="220" height="130" rx="5" fill="#FFF"/>
    
    <!-- Browser bar -->
    <rect x="90" y="50" width="220" height="25" fill="#F0F0F0"/>
    <circle cx="100" cy="62" r="4" fill="#FF5F56"/>
    <circle cx="115" cy="62" r="4" fill="#FFBD2E"/>
    <circle cx="130" cy="62" r="4" fill="#27C93F"/>
    
    <!-- Content lines -->
    <rect x="100" y="90" width="80" height="8" rx="2" fill="#000"/>
    <rect x="100" y="105" width="120" height="6" rx="2" fill="#CCC"/>
    <rect x="100" y="118" width="100" height="6" rx="2" fill="#CCC"/>
    
    <!-- Image placeholder -->
    <rect x="100" y="135" width="60" height="40" rx="4" fill="#E5E5E5" stroke="#000" stroke-width="1"/>
    <rect x="170" y="135" width="60" height="40" rx="4" fill="#E5E5E5" stroke="#000" stroke-width="1"/>
    <rect x="240" y="135" width="60" height="40" rx="4" fill="#E5E5E5" stroke="#000" stroke-width="1"/>
    
    <!-- Keyboard hint -->
    <line x1="100" y1="200" x2="300" y2="200" stroke="#999" stroke-width="1"/>
    <line x1="100" y1="210" x2="300" y2="210" stroke="#999" stroke-width="1"/>
    <line x1="100" y1="220" x2="300" y2="220" stroke="#999" stroke-width="1"/>
  </g>
</svg>
