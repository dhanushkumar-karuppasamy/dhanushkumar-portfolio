<svg width="500" height="500" viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Person sitting on chair illustration -->
  <g id="hero-illustration">
    <!-- Chair -->
    <path d="M180 350 L180 280 L200 280 L200 350" stroke="#000" stroke-width="3" fill="none"/>
    <path d="M320 350 L320 280 L300 280 L300 350" stroke="#000" stroke-width="3" fill="none"/>
    <ellipse cx="250" cy="280" rx="80" ry="15" fill="#000"/>
    <path d="M170 280 Q170 200 180 180 L180 150 L200 150 L200 180" stroke="#000" stroke-width="3" fill="none"/>
    
    <!-- Person body -->
    <ellipse cx="280" cy="200" rx="50" ry="60" fill="#000"/>
    
    <!-- Head -->
    <circle cx="280" cy="120" r="35" fill="#FFF" stroke="#000" stroke-width="3"/>
    
    <!-- Hair -->
    <path d="M250 100 Q280 80 310 100" fill="#000"/>
    <path d="M245 110 Q280 90 315 110" fill="#000"/>
    
    <!-- Face details -->
    <circle cx="270" cy="115" r="3" fill="#000"/>
    <circle cx="290" cy="115" r="3" fill="#000"/>
    <path d="M270 130 Q280 135 290 130" stroke="#000" stroke-width="2" fill="none"/>
    
    <!-- Suit/Jacket -->
    <path d="M250 160 L230 200 L230 260 L280 260 L280 200 Z" fill="#000"/>
    <path d="M310 160 L330 200 L330 260 L280 260 L280 200 Z" fill="#000"/>
    <path d="M260 170 L280 260" stroke="#FFF" stroke-width="2"/>
    <path d="M300 170 L280 260" stroke="#FFF" stroke-width="2"/>
    
    <!-- Arms -->
    <path d="M230 200 Q200 220 200 250 L220 250 Q220 230 240 220" fill="#000"/>
    <path d="M330 200 Q360 220 360 250 L340 250 Q340 230 320 220" fill="#000"/>
    
    <!-- Hands on laptop -->
    <ellipse cx="200" cy="260" rx="15" ry="10" fill="#FFF" stroke="#000" stroke-width="2"/>
    <ellipse cx="360" cy="260" rx="15" ry="10" fill="#FFF" stroke="#000" stroke-width="2"/>
    
    <!-- Laptop -->
    <rect x="220" y="250" width="120" height="80" rx="5" fill="#E5E5E5" stroke="#000" stroke-width="3"/>
    <rect x="225" y="255" width="110" height="60" fill="#FFF" stroke="#000" stroke-width="2"/>
    <line x1="230" y1="265" x2="330" y2="265" stroke="#000" stroke-width="1"/>
    <line x1="230" y1="275" x2="320" y2="275" stroke="#000" stroke-width="1"/>
    <line x1="230" y1="285" x2="310" y2="285" stroke="#000" stroke-width="1"/>
  </g>
</svg>
