<svg width="280" height="350" viewBox="0 0 280 350" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Person reading book illustration -->
  <g id="about-illustration">
    <!-- Head -->
    <circle cx="140" cy="80" r="40" fill="#FFF" stroke="#000" stroke-width="3"/>
    
    <!-- Hair -->
    <path d="M110 60 Q140 40 170 60 L170 80 Q170 50 140 45 Q110 50 110 80 Z" fill="#000"/>
    
    <!-- Face -->
    <circle cx="130" cy="75" r="3" fill="#000"/>
    <circle cx="150" cy="75" r="3" fill="#000"/>
    <path d="M130 90 Q140 95 150 90" stroke="#000" stroke-width="2" fill="none"/>
    
    <!-- Neck -->
    <rect x="130" y="115" width="20" height="15" fill="#FFF" stroke="#000" stroke-width="2"/>
    
    <!-- Shirt/Collar -->
    <path d="M120 130 L100 150 L100 180 L180 180 L180 150 L160 130 Z" fill="#000"/>
    <path d="M130 130 L140 180" stroke="#FFF" stroke-width="2"/>
    <path d="M150 130 L140 180" stroke="#FFF" stroke-width="2"/>
    
    <!-- Body -->
    <ellipse cx="140" cy="220" rx="70" ry="80" fill="#000"/>
    
    <!-- Arms -->
    <ellipse cx="80" cy="200" rx="20" ry="50" fill="#000" transform="rotate(-20 80 200)"/>
    <ellipse cx="200" cy="200" rx="20" ry="50" fill="#000" transform="rotate(20 200 200)"/>
    
    <!-- Hands -->
    <ellipse cx="70" cy="240" rx="18" ry="12" fill="#FFF" stroke="#000" stroke-width="2"/>
    <ellipse cx="210" cy="240" rx="18" ry="12" fill="#FFF" stroke="#000" stroke-width="2"/>
    
    <!-- Book -->
    <rect x="90" y="230" width="100" height="70" rx="5" fill="#FFF" stroke="#000" stroke-width="3"/>
    <line x1="140" y1="235" x2="140" y2="295" stroke="#000" stroke-width="2"/>
    <line x1="100" y1="250" x2="130" y2="250" stroke="#000" stroke-width="1.5"/>
    <line x1="100" y1="260" x2="130" y2="260" stroke="#000" stroke-width="1.5"/>
    <line x1="100" y1="270" x2="130" y2="270" stroke="#000" stroke-width="1.5"/>
    <line x1="150" y1="250" x2="180" y2="250" stroke="#000" stroke-width="1.5"/>
    <line x1="150" y1="260" x2="180" y2="260" stroke="#000" stroke-width="1.5"/>
    <line x1="150" y1="270" x2="180" y2="270" stroke="#000" stroke-width="1.5"/>
  </g>
</svg>
