<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- AI Robot head icon -->
  <g id="ai-icon">
    <!-- Head -->
    <rect x="25" y="30" width="50" height="45" rx="8" fill="#000" stroke="#FFF" stroke-width="2"/>
    
    <!-- Antenna -->
    <line x1="50" y1="30" x2="50" y2="15" stroke="#FFF" stroke-width="2"/>
    <circle cx="50" cy="12" r="4" fill="#FFF"/>
    
    <!-- Eyes -->
    <circle cx="40" cy="45" r="5" fill="#FFF"/>
    <circle cx="60" cy="45" r="5" fill="#FFF"/>
    
    <!-- Mouth -->
    <rect x="35" y="58" width="30" height="8" rx="2" fill="#FFF"/>
    <line x1="40" y1="58" x2="40" y2="66" stroke="#000" stroke-width="1"/>
    <line x1="45" y1="58" x2="45" y2="66" stroke="#000" stroke-width="1"/>
    <line x1="50" y1="58" x2="50" y2="66" stroke="#000" stroke-width="1"/>
    <line x1="55" y1="58" x2="55" y2="66" stroke="#000" stroke-width="1"/>
    <line x1="60" y1="58" x2="60" y2="66" stroke="#000" stroke-width="1"/>
  </g>
</svg>
